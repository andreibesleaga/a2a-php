name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

env:
  # Official A2A TCK pinned to the latest v0.3.0-era release.
  # Bump deliberately via PR only — see docs/tck-upgrade.md.
  A2A_TCK_REF: 0.3.0.beta5

jobs:
  test:
    name: PHP ${{ matrix.php }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax lint
        run: |
          ! find src tests examples -name "*.php" -print0 \
            | xargs -0 -n1 php -l 2>&1 \
            | grep -v "No syntax errors"

      - name: Coding standard (PSR-12)
        run: vendor/bin/phpcs -n

      - name: Static analysis (PHPStan level 8 + baseline)
        run: vendor/bin/phpstan analyse --no-progress

      - name: Dependency CVE audit
        run: composer audit

      - name: PHPUnit (unit + integration + e2e)
        run: vendor/bin/phpunit

  tck:
    name: Official A2A TCK (v0.3.0)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Checkout pinned A2A TCK
        uses: actions/checkout@v7
        with:
          repository: a2aproject/a2a-tck
          ref: ${{ env.A2A_TCK_REF }}
          path: a2a-tck

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install TCK
        working-directory: a2a-tck
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Start reference server
        run: |
          php -S localhost:8081 examples/complete_a2a_server.php &
          for i in $(seq 1 50); do
            curl -sf -X POST http://localhost:8081/ \
              -H 'Content-Type: application/json' \
              -d '{"jsonrpc":"2.0","method":"ping","id":1}' > /dev/null && break
            sleep 0.2
          done

      - name: Run TCK (all categories)
        working-directory: a2a-tck
        run: |
          python run_tck.py --sut-url http://localhost:8081 --category all \
            --compliance-report tck-compliance-report.json

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tck-compliance-report
          path: a2a-tck/tck-compliance-report.json
          if-no-files-found: ignore
